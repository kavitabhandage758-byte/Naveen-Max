        }

            background: linear-gradient(to right, #00d2ff, #92fe9d);

            border: 1px solid #333;
            color: white;
            padding: 12px;

    <!-- ✅ ADDED SCRIPT FIX -->
    <script>
    window.addEventListener('load', function() {
        if (typeof AOS !== "undefined") {
            AOS.refresh();
        }
    });

    setTimeout(() => {
        document.querySelectorAll('[data-aos]').forEach(el => {
